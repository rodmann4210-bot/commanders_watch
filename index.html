<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAUNCH WATCH // ROD'S BRIEFING</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --bg:       #060810;
  --panel:    #0b0f1a;
  --border:   #162030;
  --glow:     #00e5ff;
  --hot:      #ff4500;
  --go:       #00ff88;
  --warn:     #ffcc00;
  --dim:      #2a3a4a;
  --text:     #8aa8c0;
  --bright:   #d0e8f8;
  --scanline: rgba(0,229,255,0.025);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  overflow-x: hidden;
  font-size: 16px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    var(--scanline) 2px,
    var(--scanline) 4px
  );
  pointer-events: none;
  z-index: 999;
}

#stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.6;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 22px 18px 48px;
}

/* ─── MASTHEAD ─────────────────────────────────── */
.masthead {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  padding-bottom: 14px;
  margin-bottom: 18px;
  gap: 12px;
  flex-wrap: wrap;
}

.masthead-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.4rem, 7vw, 3.8rem);
  letter-spacing: 0.08em;
  line-height: 1;
  color: var(--glow);
  text-shadow: 0 0 28px rgba(0,229,255,0.45), 0 0 60px rgba(0,229,255,0.15);
  position: relative;
}

.masthead-title::after {
  content: 'LAUNCH WATCH';
  position: absolute;
  inset: 0;
  color: var(--hot);
  opacity: 0;
  animation: glitch 8s infinite;
  clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
}

@keyframes glitch {
  0%,94%,100%  { opacity:0; transform:translateX(0); }
  95%          { opacity:0.6; transform:translateX(-3px); }
  96%          { opacity:0.4; transform:translateX(3px); }
  97%          { opacity:0; }
}

.masthead-sub {
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  color: var(--dim);
  line-height: 1.9;
  text-align: right;
}

.masthead-sub .highlight { color: var(--glow); }

/* ─── TICKER ───────────────────────────────────── */
.ticker-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  border-left: 3px solid var(--hot);
  overflow: hidden;
  margin-bottom: 18px;
  height: 34px;
  display: flex;
  align-items: center;
}

.ticker-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 0.12em;
  color: var(--hot);
  padding: 0 14px;
  white-space: nowrap;
  border-right: 1px solid var(--border);
  height: 100%;
  display: flex;
  align-items: center;
}

.ticker-track {
  overflow: hidden;
  flex: 1;
  height: 100%;
  display: flex;
  align-items: center;
}

.ticker-inner {
  display: flex;
  gap: 60px;
  white-space: nowrap;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  color: var(--text);
  animation: ticker 40s linear infinite;
}

.ticker-inner .sep { color: var(--dim); }
.ticker-inner .go-tag { color: var(--go); }
.ticker-inner .warn-tag { color: var(--warn); }

@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* ─── HERO ─────────────────────────────────────── */
/* ─── RECENT LAUNCHES STRIP ────────────────────── */
.recent-section { margin-bottom: 18px; }

.recent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 8px;
}

.recent-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-left: 3px solid var(--dim);
  padding: 11px 14px;
  position: relative;
  transition: border-color 0.15s, background 0.15s;
}

.recent-card.r-suc { border-left-color: var(--glow); }
.recent-card.r-fail { border-left-color: var(--hot); }

.recent-card:hover { background:#0d1420; border-color: rgba(0,229,255,0.25); }

.recent-name {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--bright);
  margin-bottom: 5px;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.recent-meta {
  font-size: 0.66rem;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 8px;
}
.recent-meta em { color: var(--dim); font-style: normal; }

.recent-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}

.recent-tplus {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.05rem;
  letter-spacing: 0.05em;
  color: var(--go);
}
.recent-tplus.fail { color: var(--hot); }

.recent-yt {
  font-size: 0.66rem;
  color: var(--hot);
  text-decoration: none;
  letter-spacing: 0.05em;
  white-space: nowrap;
  border: 1px solid rgba(255,69,0,0.4);
  padding: 3px 8px;
  border-radius: 2px;
  transition: all 0.15s;
}
.recent-yt:hover { background: rgba(255,69,0,0.12); }

.hero {
  background: linear-gradient(135deg, #0d1525 0%, #0a0f1c 100%);
  border: 1px solid var(--border);
  border-top: 2px solid var(--glow);
  border-radius: 2px;
  padding: 22px 24px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
}

.hero-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  color: var(--glow);
  border: 1px solid var(--glow);
  display: inline-block;
  padding: 2px 10px;
  margin-bottom: 10px;
  opacity: 0.8;
}

.hero-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.7rem, 4.5vw, 2.4rem);
  letter-spacing: 0.06em;
  color: var(--bright);
  line-height: 1.1;
  margin-bottom: 10px;
}

.hero-meta {
  font-size: 0.82rem;
  color: var(--text);
  line-height: 2.1;
  margin-bottom: 14px;
}

.hero-meta strong { color: var(--bright); }

.hero-countdown {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.cd-block {
  text-align: center;
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  padding: 10px 16px;
  min-width: 68px;
}

.cd-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  color: var(--glow);
  line-height: 1;
  text-shadow: 0 0 12px rgba(0,229,255,0.5);
}

.cd-label {
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  color: var(--dim);
  margin-top: 3px;
}

/* ─── WEATHER STRIP ────────────────────────────── */
.weather-strip {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-left: 3px solid var(--glow);
  padding: 10px 14px;
  margin-top: 14px;
  font-size: 0.78rem;
}

.weather-strip .wx-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.82rem;
  letter-spacing: 0.15em;
  color: var(--glow);
  white-space: nowrap;
}

.wx-item {
  color: var(--text);
  white-space: nowrap;
}

.wx-item strong { color: var(--bright); }
.wx-item.wx-warn { color: var(--warn); }
.wx-item.wx-good { color: var(--go); }

.wx-loading { color: var(--dim); font-size: 0.72rem; font-style: italic; }

/* ─── GRID ─────────────────────────────────────── */
.section-header {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.05rem;
  letter-spacing: 0.2em;
  color: var(--dim);
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 12px;
  margin-top: 4px;
}

.grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 22px;
}

.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-left: 3px solid var(--dim);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  padding: 13px 16px;
  transition: border-color 0.15s, background 0.15s;
  cursor: default;
}

.card:hover {
  background: #0d1420;
  border-color: rgba(0,229,255,0.25);
}

.card.s-go   { border-left-color: var(--go); }
.card.s-tbd  { border-left-color: var(--warn); }
.card.s-hold { border-left-color: var(--hot); }

.card-name {
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--bright);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-meta {
  font-size: 0.74rem;
  color: var(--text);
  line-height: 1.7;
}

.card-meta em { color: var(--dim); font-style: normal; }

.card-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: space-between;
  gap: 4px;
  flex-shrink: 0;
}

.card-cd {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.06em;
  color: var(--glow);
  white-space: nowrap;
}

.card-date {
  font-size: 0.68rem;
  color: var(--dim);
  white-space: nowrap;
  text-align: right;
}

.badge {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 2px 7px;
  border-radius: 2px;
}

.b-go   { background: rgba(0,255,136,0.12); color:var(--go);  border:1px solid rgba(0,255,136,0.4); }
.b-tbd  { background: rgba(255,204,0,0.1);  color:var(--warn); border:1px solid rgba(255,204,0,0.35); }
.b-hold { background: rgba(255,69,0,0.12);  color:var(--hot);  border:1px solid rgba(255,69,0,0.4); }
.b-suc  { background: rgba(0,229,255,0.1);  color:var(--glow); border:1px solid rgba(0,229,255,0.3); }

.yt-link {
  font-size: 0.68rem;
  color: var(--hot);
  text-decoration: none;
  letter-spacing: 0.06em;
  opacity: 0.8;
  transition: opacity 0.15s;
}
.yt-link:hover { opacity: 1; }

/* ─── FOOTER ───────────────────────────────────── */
.foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border);
  padding-top: 12px;
  font-size: 0.72rem;
  color: var(--dim);
  letter-spacing: 0.1em;
  flex-wrap: wrap;
  gap: 6px;
}

.foot .next-refresh { color: var(--text); }

/* ─── LOADING / ERROR ──────────────────────────── */
.loading-msg {
  text-align: center;
  padding: 48px 20px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 0.15em;
  color: var(--dim);
}

.loading-msg .spinner {
  display: block;
  width: 36px; height: 36px;
  border: 2px solid var(--dim);
  border-top-color: var(--glow);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to{transform:rotate(360deg)} }

.error-msg {
  border: 1px solid var(--hot);
  padding: 14px 18px;
  font-size: 0.8rem;
  color: var(--hot);
  background: rgba(255,69,0,0.06);
  margin-bottom: 16px;
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="app">

  <div class="masthead">
    <div class="masthead-title">LAUNCH WATCH</div>
    <div class="masthead-sub">
      ROD'S DAILY BRIEFING<br>
      <span class="highlight" id="today-date">——</span><br>
      DATA: THE SPACE DEVS LL2
    </div>
  </div>

  <div class="ticker-wrap">
    <div class="ticker-label">UPCOMING</div>
    <div class="ticker-track">
      <div class="ticker-inner" id="ticker"><span>LOADING LAUNCH DATA...</span></div>
    </div>
  </div>

  <div class="recent-section" id="recentSection" style="display:none">
    <div class="section-header">RECENT LAUNCHES // LAST 3 · REPLAY</div>
    <div class="recent-grid" id="recentGrid"></div>
  </div>

  <div id="heroSection"></div>

  <div class="section-header">LAUNCH QUEUE // NEXT 8</div>
  <div class="grid" id="launchGrid">
    <div class="loading-msg">
      <span class="spinner"></span>
      ACQUIRING SIGNAL...
    </div>
  </div>

  <div class="foot">
    <span>LAUNCH WATCH · ROD GRIMES · PONTIAC/KIRKWOOD MO</span>
    <span class="next-refresh">AUTO-REFRESH: <span id="refreshCountdown">——</span></span>
  </div>

</div>

<script>
/* ── STARFIELD ─────────────────────────────────── */
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){ c.width=window.innerWidth; c.height=window.innerHeight; }
  function init(){
    resize();
    stars = Array.from({length:160}, ()=>({
      x:Math.random()*c.width, y:Math.random()*c.height,
      r:Math.random()*1.2+0.2, o:Math.random()*0.6+0.1, s:(Math.random()-0.5)*0.05
    }));
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,220,255,${s.o})`; ctx.fill();
      s.o+=s.s; if(s.o>0.7||s.o<0.05) s.s*=-1;
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  init(); draw();
})();

/* ── HELPERS ───────────────────────────────────── */
function countdown(net){
  const diff = new Date(net)-Date.now();
  if(diff<=0){
    // Post-liftoff: count UP as T+
    const up = Math.abs(diff);
    const d=Math.floor(up/86400000),
          h=Math.floor((up%86400000)/3600000),
          m=Math.floor((up%3600000)/60000),
          s=Math.floor((up%60000)/1000);
    const str = d>0?`T+${d}D ${String(h).padStart(2,'0')}H`:
                h>0?`T+${String(h).padStart(2,'0')}H ${String(m).padStart(2,'0')}M`:
                    `T+${String(m).padStart(2,'0')}M ${String(s).padStart(2,'0')}S`;
    return {str,d,h,m,s,elapsed:true};
  }
  const d=Math.floor(diff/86400000),
        h=Math.floor((diff%86400000)/3600000),
        m=Math.floor((diff%3600000)/60000),
        s=Math.floor((diff%60000)/1000);
  const str = d>0?`T-${d}D ${String(h).padStart(2,'0')}H`:
              h>0?`T-${String(h).padStart(2,'0')}H ${String(m).padStart(2,'0')}M`:
                  `T-${String(m).padStart(2,'0')}M ${String(s).padStart(2,'0')}S`;
  return {str,d,h,m,s,elapsed:false};
}

// T+ format for recent launches: days/hours
function countUp(net){
  const up = Date.now()-new Date(net);
  if(up<0) return 'T+00H';
  const d=Math.floor(up/86400000),
        h=Math.floor((up%86400000)/3600000),
        m=Math.floor((up%3600000)/60000);
  if(d>0) return `T+${d}D ${String(h).padStart(2,'0')}H`;
  if(h>0) return `T+${String(h).padStart(2,'0')}H ${String(m).padStart(2,'0')}M`;
  return `T+${String(m).padStart(2,'0')}M`;
}

function fmtDate(net){
  if(!net) return 'TBD';
  return new Date(net).toLocaleDateString('en-US',{
    month:'short',day:'numeric',year:'numeric',
    hour:'2-digit',minute:'2-digit',timeZoneName:'short'
  });
}

function statusClass(a){ a=(a||'').toLowerCase(); return a==='go'?'s-go':a==='hold'?'s-hold':'s-tbd'; }
function badgeClass(a){  a=(a||'').toLowerCase(); return a==='go'?'b-go':a==='hold'?'b-hold':a==='success'?'b-suc':'b-tbd'; }
function ytLink(n){ return 'https://www.youtube.com/results?search_query='+encodeURIComponent((n||'')+' launch livestream'); }

/* ── WEATHER ───────────────────────────────────── */
// Fallback coords for well-known launch sites when API returns no lat/lon
const PAD_COORDS = {
  // Cape Canaveral / KSC
  'cape canaveral':           { lat: 28.3922, lon: -80.6077 },
  'kennedy space center':     { lat: 28.5729, lon: -80.6490 },
  'slc-40':                   { lat: 28.5618, lon: -80.5772 },
  'lc-39a':                   { lat: 28.6083, lon: -80.6042 },
  'slc-41':                   { lat: 28.5834, lon: -80.5830 },
  // Vandenberg
  'vandenberg':               { lat: 34.7420, lon: -120.5724 },
  'slc-4e':                   { lat: 34.6321, lon: -120.6107 },
  'slc-4w':                   { lat: 34.6360, lon: -120.6130 },
  // Boca Chica / Starbase
  'boca chica':               { lat: 25.9969, lon: -97.1571 },
  'starbase':                 { lat: 25.9969, lon: -97.1571 },
  // Wallops
  'wallops':                  { lat: 37.9402, lon: -75.4664 },
  // CCAFS
  'ccafs':                    { lat: 28.4889, lon: -80.5778 },
  // New Zealand / RocketLab
  'mahia':                    { lat: -39.2596, lon: 177.8646 },
  'launch complex 1':         { lat: -39.2596, lon: 177.8646 },
  // Kwajalein / SpaceX
  'omelek':                   { lat:  9.0483, lon: 167.7430 },
  // Plesetsk
  'plesetsk':                 { lat: 62.9271, lon: 40.5777 },
  // Baikonur
  'baikonur':                 { lat: 45.9200, lon: 63.3420 },
  // Jiuquan
  'jiuquan':                  { lat: 40.9606, lon: 100.2983 },
  // Tanegashima
  'tanegashima':              { lat: 30.3992, lon: 130.9707 },
  // Guiana Space Centre
  'kourou':                   { lat:  5.2364, lon: -52.7695 },
  'guiana':                   { lat:  5.2364, lon: -52.7695 },
};

function resolveCoords(lat, lon, padName, locName, missionName) {
  // Use API coords if present and non-zero — confirmed pad
  if (lat && lon && (Math.abs(lat) > 0.01 || Math.abs(lon) > 0.01)) return { lat, lon, estimate:false };
  // Try matching pad name or location name against known sites — still confirmed location
  const search = ((padName||'') + ' ' + (locName||'')).toLowerCase();
  for (const [key, coords] of Object.entries(PAD_COORDS)) {
    if (search.includes(key)) return { ...coords, estimate:false };
  }
  // Last resort: infer from mission/rocket name — flagged as ESTIMATE
  const mission = (missionName||'').toLowerCase();
  if (mission.includes('starlink') || mission.includes('falcon 9') || mission.includes('falcon heavy') || mission.includes('crew dragon') || mission.includes('cargo dragon')) {
    return { ...PAD_COORDS['cape canaveral'], estimate:true, site:'Cape Canaveral (est.)' };
  }
  if (mission.includes('antares') || mission.includes('cygnus')) {
    return { ...PAD_COORDS['wallops'], estimate:true, site:'Wallops (est.)' };
  }
  if (mission.includes('electron')) {
    return { ...PAD_COORDS['mahia'], estimate:true, site:'Mahia (est.)' };
  }
  if (mission.includes('long march') || mission.includes('tianzhou') || mission.includes('shenzhou')) {
    return { ...PAD_COORDS['jiuquan'], estimate:true, site:'Jiuquan (est.)' };
  }
  return null;
}

// Open-Meteo (free, no key): fetch by lat/lon
const WMO_CODES = {
  0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',
  45:'Foggy',48:'Icy Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',
  61:'Light Rain',63:'Rain',65:'Heavy Rain',71:'Light Snow',73:'Snow',75:'Heavy Snow',
  80:'Rain Showers',81:'Heavy Showers',82:'Violent Showers',
  95:'Thunderstorm',96:'Thunderstorm+Hail',99:'Thunderstorm+Heavy Hail'
};

function windDir(deg){
  const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg/22.5)%16];
}

async function fetchWeather(lat, lon, padName){
  if(!lat||!lon) return null;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,winddirection_10m,precipitation_probability&wind_speed_unit=mph&temperature_unit=fahrenheit&forecast_days=1`;
    const res = await fetch(url);
    if(!res.ok) return null;
    const d = await res.json();
    const c = d.current;
    return {
      temp: Math.round(c.temperature_2m),
      code: c.weathercode,
      desc: WMO_CODES[c.weathercode] || 'Unknown',
      wind: Math.round(c.windspeed_10m),
      windDir: windDir(c.winddirection_10m),
      precip: c.precipitation_probability
    };
  } catch(e){ return null; }
}

function weatherIcon(code){
  if(code===0||code===1) return '☀️';
  if(code===2||code===3) return '⛅';
  if(code>=45&&code<=48) return '🌫️';
  if(code>=51&&code<=65) return '🌧️';
  if(code>=71&&code<=75) return '❄️';
  if(code>=80&&code<=82) return '🌦️';
  if(code>=95) return '⛈️';
  return '🌡️';
}

function renderWeather(wx, padName, container, estimate, siteLabel){
  if(!wx){
    const site = padName && padName !== 'Pad TBD' ? padName : 'this site';
    container.innerHTML=`<span class="wx-item" style="color:var(--dim)">⛅ Weather data unavailable for <strong style="color:var(--text)">${site}</strong></span>`;
    return;
  }
  const precipClass = wx.precip>50 ? 'wx-warn' : wx.precip>20 ? '' : 'wx-good';
  const label = estimate
    ? `<span class="wx-label" style="color:var(--warn)" title="Pad not yet assigned — using likely site">⚠ EST. WX</span>`
    : `<span class="wx-label">⛅ SITE WX</span>`;
  const siteNote = estimate && siteLabel
    ? `<span class="wx-item" style="color:var(--warn);font-style:italic">📍 ${siteLabel}</span>`
    : '';
  container.innerHTML = `
    ${label}
    ${siteNote}
    <span class="wx-item">${weatherIcon(wx.code)} <strong>${wx.desc}</strong></span>
    <span class="wx-item">🌡 <strong>${wx.temp}°F</strong></span>
    <span class="wx-item">💨 <strong>${wx.wind} mph ${wx.windDir}</strong></span>
    <span class="wx-item ${precipClass}">🌧 Precip: <strong>${wx.precip}%</strong></span>
  `;
}

/* ── HERO ──────────────────────────────────────── */
let heroTimer = null;

async function renderHero(l){
  if(!l){ document.getElementById('heroSection').innerHTML=''; return; }
  const net    = l.net;
  const rocket = l.rocket?.configuration?.name||'?';
  const org    = l.launch_service_provider?.name||'';
  const pad    = l.pad?.name||'';
  const loc    = l.pad?.location?.name||'';
  const lat    = l.pad?.latitude;
  const lon    = l.pad?.longitude;
  const coords = resolveCoords(lat, lon, pad, loc, l.name);
  const status = l.status?.abbrev||'TBD';

  function update(){
    const {d,h,m,s}=countdown(net);
    const el=document.getElementById('hero-cd');
    if(el) el.innerHTML=`
      <div class="cd-block"><div class="cd-num">${String(d).padStart(2,'0')}</div><div class="cd-label">DAYS</div></div>
      <div class="cd-block"><div class="cd-num">${String(h).padStart(2,'0')}</div><div class="cd-label">HRS</div></div>
      <div class="cd-block"><div class="cd-num">${String(m).padStart(2,'0')}</div><div class="cd-label">MIN</div></div>
      <div class="cd-block"><div class="cd-num">${String(s).padStart(2,'0')}</div><div class="cd-label">SEC</div></div>`;
  }

  document.getElementById('heroSection').innerHTML=`
    <div class="hero" style="margin-bottom:16px">
      <div class="hero-badge">▶ NEXT LAUNCH</div>
      <div class="hero-name">${l.name||'MISSION TBD'}</div>
      <div class="hero-meta">
        🚀 <strong>${rocket}</strong>${org?' · '+org:''}<br>
        📍 ${pad||loc||'Pad TBD'}${pad&&loc?', '+loc:''}<br>
        📅 ${fmtDate(net)}&nbsp;&nbsp;
        <span class="badge ${badgeClass(status)}">${status}</span>
      </div>
      <div class="hero-countdown" id="hero-cd"></div>
      <div class="weather-strip" id="hero-wx">
        <span class="wx-loading">Fetching launch site weather...</span>
      </div>
      <div style="margin-top:12px">
        <a class="yt-link" href="${ytLink(l.name)}" target="_blank">▶ FIND ON YOUTUBE</a>
      </div>
    </div>`;

  if(heroTimer) clearInterval(heroTimer);
  update();
  heroTimer = setInterval(update, 1000);

  // Fetch weather async after render — isolated so a failure never breaks the page
  try {
    const wx = await fetchWeather(coords?.lat, coords?.lon, pad||loc);
    const wxEl = document.getElementById('hero-wx');
    if(wxEl) renderWeather(wx, pad||loc, wxEl, coords?.estimate, coords?.site);
  } catch(e){
    const wxEl = document.getElementById('hero-wx');
    if(wxEl) wxEl.innerHTML = '<span class="wx-item" style="color:var(--dim)">⛅ Weather lookup failed</span>';
  }
}

/* ── RECENT LAUNCHES ───────────────────────────── */
function renderRecent(launches){
  const section = document.getElementById('recentSection');
  const grid = document.getElementById('recentGrid');
  if(!launches || !launches.length){ section.style.display='none'; return; }
  try {
    grid.innerHTML = launches.map(l=>{
      const stat = l.status?.abbrev||'';
      const statName = (l.status?.name||'').toLowerCase();
      const success = statName.includes('success') || stat==='Success';
      const failed  = statName.includes('fail') || statName.includes('partial');
      const rock = l.rocket?.configuration?.name||'?';
      const org  = l.launch_service_provider?.abbrev||l.launch_service_provider?.name||'';
      const loc  = l.pad?.location?.name||'';
      const cls  = success ? 'r-suc' : failed ? 'r-fail' : '';
      const tpCls = failed ? 'fail' : '';
      return `
        <div class="recent-card ${cls}" data-net="${l.net||''}">
          <div class="recent-name">${l.name||'Mission'}</div>
          <div class="recent-meta">
            🚀 ${rock}${org?' <em>·</em> '+org:''}<br>
            📍 <em>${loc||'—'}</em>${stat?` <em>·</em> ${stat}`:''}
          </div>
          <div class="recent-bottom">
            <span class="recent-tplus ${tpCls}" data-net="${l.net||''}">${l.net?countUp(l.net):'—'}</span>
            <a class="recent-yt" href="${ytLink(l.name)}" target="_blank">▶ REPLAY</a>
          </div>
        </div>`;
    }).join('');
    section.style.display='block';
  } catch(e){
    section.style.display='none';
  }
}

function startRecentCountUp(){
  setInterval(()=>{
    document.querySelectorAll('.recent-tplus[data-net]').forEach(el=>{
      const net = el.getAttribute('data-net');
      if(net) el.textContent = countUp(net);
    });
  }, 60000); // minute resolution is plenty for T+ days/hours
}

/* ── GRID ──────────────────────────────────────── */
function renderGrid(launches){
  const grid = document.getElementById('launchGrid');
  if(!launches.length){ grid.innerHTML='<div style="text-align:center;padding:30px;color:var(--dim);font-size:0.8rem">NO LAUNCH DATA</div>'; return; }
  try {
    const queue = launches.slice(1);
    grid.innerHTML = queue.map((l,i)=>{
    const cd   = countdown(l.net);
    const stat = l.status?.abbrev||'TBD';
    const rock = l.rocket?.configuration?.name||'?';
    const org  = l.launch_service_provider?.abbrev||l.launch_service_provider?.name||'';
    const loc  = l.pad?.location?.name||'Pad TBD';
    return `
      <div class="card ${statusClass(stat)}" data-idx="${i+1}">
        <div>
          <div class="card-name">${l.name||'TBD'}</div>
          <div class="card-meta">
            🚀 ${rock}${org?' <em>·</em> '+org:''}&nbsp;&nbsp;📍 <em>${loc}</em>
          </div>
        </div>
        <div class="card-right">
          <div class="card-cd">${cd.str}</div>
          <div class="card-date">${fmtDate(l.net)}</div>
          <span class="badge ${badgeClass(stat)}">${stat}</span>
          <a class="yt-link" href="${ytLink(l.name)}" target="_blank">▶ YT</a>
        </div>
      </div>`;
    }).join('');
  } catch(e){
    grid.innerHTML = `<div class="error-msg">⚠ Could not render launch queue: ${e.message}</div>`;
  }
}

/* ── TICKER ────────────────────────────────────── */
function renderTicker(launches){
  const items = launches.map(l=>{
    const stat=l.status?.abbrev||'TBD';
    const cls=stat==='GO'?'go-tag':stat==='Hold'?'warn-tag':'';
    const cd=countdown(l.net).str;
    return `<span class="${cls}">${l.name||'TBD'}</span>&nbsp;[${cd}]&nbsp;<span class="sep">·</span>`;
  });
  document.getElementById('ticker').innerHTML=[...items,...items].join(' ');
}

/* ── DATE / REFRESH ────────────────────────────── */
function setTodayDate(){
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'}).toUpperCase();
}

function startRefreshTimer(){
  // Refresh at 00:00, 08:00, and 16:00 local time — find the next one
  function nextRefresh(){
    const now = new Date();
    const times = [0, 8, 16]; // hours
    for(const hr of times){
      const t = new Date(now);
      t.setHours(hr, 0, 0, 0);
      if(t.getTime() > now.getTime()) return t.getTime();
    }
    // All of today's slots have passed — roll to midnight tomorrow
    const t = new Date(now);
    t.setHours(24, 0, 0, 0);
    return t.getTime();
  }
  let target = nextRefresh();
  setInterval(()=>{
    const left=target-Date.now();
    if(left<=0){ location.reload(); return; }
    const h=Math.floor(left/3600000),
          m=Math.floor((left%3600000)/60000),
          s=Math.floor((left%60000)/1000);
    document.getElementById('refreshCountdown').textContent=
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },1000);
}

function startCardCountdowns(launches){
  setInterval(()=>{
    launches.slice(1).forEach((l,i)=>{
      const el=document.querySelector(`.card[data-idx="${i+1}"] .card-cd`);
      if(el) el.textContent=countdown(l.net).str;
    });
  },15000);
}

/* ── INIT ──────────────────────────────────────── */
async function init(){
  setTodayDate();
  startRefreshTimer();
  let launches=[];
  try {
    // Detailed mode (no mode=list) returns full pad objects with name + lat/lon.
    // limit kept modest to respect the API's stricter rate limit on detailed calls.
    const res=await fetch('https://ll.thespacedevs.com/2.3.0/launches/upcoming/?limit=9&format=json');
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    launches=data.results||[];
  } catch(err){
    document.getElementById('launchGrid').innerHTML=
      `<div class="error-msg">⚠ API ERROR: ${err.message}<br><small>Page will auto-retry at the next scheduled refresh (00:00 / 08:00 / 16:00).</small></div>`;
    return;
  }
  // Render instant content first — these must never wait on the weather network call
  renderGrid(launches);
  renderTicker(launches);
  startCardCountdowns(launches);
  // Hero last; its internal weather fetch resolves on its own without blocking the above
  renderHero(launches[0]||null);

  // Recent launches — separate, non-blocking fetch (ordered most-recent first)
  fetchRecent();
}

async function fetchRecent(){
  try {
    const res=await fetch('https://ll.thespacedevs.com/2.3.0/launches/previous/?limit=3&format=json&ordering=-net');
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const recent=data.results||[];
    renderRecent(recent);
    startRecentCountUp();
  } catch(e){
    // Silent — recent strip just stays hidden if it fails
    document.getElementById('recentSection').style.display='none';
  }
}

init();
</script>
